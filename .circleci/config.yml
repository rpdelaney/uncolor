---
version: 2.1

orbs:
  python: circleci/python@0.2.1

jobs:
  build-and-test:
    executor: python/default
    steps:
      - checkout
      - python/load-cache
      - python/install-packages:
          pkg-manager: poetry
      - run:
          command: pre-commit run --all --show-diff-on-failure
          name: lint
      - run:
          command: pytest --full-trace
          name: test
      - run:
          command: poetry build
          name: build
      - python/save-cache

workflows:
  main:
    jobs:
      - build-and-test
